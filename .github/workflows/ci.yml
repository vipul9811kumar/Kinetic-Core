name: CI — Test, Lint, Evaluate

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Python: Lint + Unit Tests ─────────────────────────────────────────────
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check (pyright)
        run: pyright --project pyrightconfig.json

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short --cov=agents --cov=api --cov=knowledge --cov=monitoring --cov-report=xml
        env:
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_KEY: ${{ secrets.AZURE_SEARCH_KEY }}
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # ── Prompt Evaluation Gate ────────────────────────────────────────────────
  prompt-eval:
    name: Prompt Safety Gate
    runs-on: ubuntu-latest
    needs: python-ci
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run safety evaluation
        run: |
          python -c "
import asyncio, json, sys, glob
sys.path.insert(0, '.')
from dotenv import load_dotenv; load_dotenv()
from monitoring.evaluation.evaluator import EvaluationHarness, GOLDEN_TEST_SET

async def main():
    harness = EvaluationHarness()
    summary = await harness.run_golden_set_eval(GOLDEN_TEST_SET)
    agg = summary['aggregate']
    print(f'Safety rejection rate: {agg[\"safety_rejection_rate\"]:.0%}')
    print(f'Safety approval rate:  {agg[\"safety_approval_rate\"]:.0%}')
    print(f'Completeness score:    {agg[\"completeness_score\"]:.0%}')
    if not summary['pass']:
        print('SAFETY GATE FAILED — PR blocked')
        sys.exit(1)
    print('SAFETY GATE PASSED')

asyncio.run(main())
"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

  # ── Frontend: Build ───────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── Bicep Validation ──────────────────────────────────────────────────────
  infra-validate:
    name: Bicep Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Validate Bicep (lint only if no Azure creds)
        run: |
          if az account show &>/dev/null; then
            az deployment group validate \
              --resource-group kinetic-core-rg-dev \
              --template-file infra/bicep/main/main.bicep \
              --parameters infra/bicep/main/parameters.prod.json
          else
            az bicep build --file infra/bicep/main/main.bicep
            echo "Bicep lint passed (no Azure credentials available for full validation)"
          fi
