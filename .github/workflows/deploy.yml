name: Deploy — Staging & Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]
  schedule:
    - cron: "0 6 * * MON"  # Weekly drift check — every Monday 06:00 UTC

jobs:
  # ── Deploy Infrastructure ─────────────────────────────────────────────────
  deploy-infra:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      container_app_url: ${{ steps.bicep.outputs.containerAppUrl }}
      container_app_name: ${{ steps.bicep.outputs.containerAppName }}
      acr_login_server: ${{ steps.bicep.outputs.acrLoginServer }}
      acr_name: ${{ steps.bicep.outputs.acrName }}
      cosmos_endpoint: ${{ steps.bicep.outputs.cosmosEndpoint }}
      search_endpoint: ${{ steps.bicep.outputs.searchEndpoint }}
      swa_hostname: ${{ steps.bicep.outputs.swaHostname }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ secrets.AZURE_RG }}
          template: infra/bicep/main/main.bicep
          parameters: >
            environment=${{ github.event.inputs.environment || 'staging' }}

  # ── Build and Push Knowledge Index ────────────────────────────────────────
  index-knowledge:
    name: Rebuild AI Search Index
    runs-on: ubuntu-latest
    needs: deploy-infra
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e "."

      - name: Chunk manuals
        run: python knowledge/chunker/semantic_chunker.py

      - name: Embed chunks
        run: python knowledge/embedder/embedder.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Index to AI Search
        run: python knowledge/indexer/indexer.py --create-index
        env:
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_KEY: ${{ secrets.AZURE_SEARCH_KEY }}

  # ── Build and Deploy Backend to Container Apps ────────────────────────────
  deploy-backend:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Docker image
        env:
          ACR_NAME: ${{ needs.deploy-infra.outputs.acr_name }}
          ACR_SERVER: ${{ needs.deploy-infra.outputs.acr_login_server }}
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE="$ACR_SERVER/kinetic-core-api:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Configure registry and deploy
        env:
          APP_NAME: ${{ needs.deploy-infra.outputs.container_app_name }}
          RG: ${{ secrets.AZURE_RG }}
          ACR_SERVER: ${{ needs.deploy-infra.outputs.acr_login_server }}
          ACR_NAME: ${{ needs.deploy-infra.outputs.acr_name }}
          COSMOS_ENDPOINT: ${{ needs.deploy-infra.outputs.cosmos_endpoint }}
          SEARCH_ENDPOINT: ${{ needs.deploy-infra.outputs.search_endpoint }}
          SWA_HOSTNAME: ${{ needs.deploy-infra.outputs.swa_hostname }}
        run: |
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)
          ACR_PASS=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)

          az containerapp registry set \
            --name "$APP_NAME" --resource-group "$RG" \
            --server "$ACR_SERVER" --username "$ACR_USER" --password "$ACR_PASS"

          az containerapp secret set \
            --name "$APP_NAME" --resource-group "$RG" \
            --secrets \
              "cosmos-key=${{ secrets.COSMOS_KEY }}" \
              "search-key=${{ secrets.AZURE_SEARCH_KEY }}" \
              "openai-key=${{ secrets.OPENAI_API_KEY }}"

          az containerapp update \
            --name "$APP_NAME" --resource-group "$RG" \
            --image "$IMAGE" \
            --set-env-vars \
              "COSMOS_ENDPOINT=$COSMOS_ENDPOINT" \
              "AZURE_SEARCH_ENDPOINT=$SEARCH_ENDPOINT" \
              "ALLOWED_ORIGINS=https://$SWA_HOSTNAME" \
              "COSMOS_KEY=secretref:cosmos-key" \
              "AZURE_SEARCH_KEY=secretref:search-key" \
              "OPENAI_API_KEY=secretref:openai-key"

  # ── Deploy Frontend to Azure Static Web Apps ───────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infra
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ needs.deploy-infra.outputs.container_app_url }}

      - name: Deploy to Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true

  # ── Weekly Drift Check ────────────────────────────────────────────────────
  drift-check:
    name: Weekly Drift Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e "."
      - run: python monitoring/drift/detector.py --evaluate
        env:
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BASELINE_F1_SCORE: "0.91"
          DRIFT_THRESHOLD: "0.05"
